  <text x="700" y="112" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#64748B">Streamlit workspace, FastAPI services, resume intelligence modules, database, and Gemini-powered generation</text>

