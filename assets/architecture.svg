  </defs>

  <rect width="1400" height="780" rx="34" fill="url(#bg)"/>
  <circle cx="1110" cy="92" r="210" fill="#DCEBFF" opacity="0.45"/>
  <circle cx="160" cy="690" r="250" fill="#CFFAFE" opacity="0.35"/>

